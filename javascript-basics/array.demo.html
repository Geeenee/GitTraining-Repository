<script>
	let sumInput = (array) => {
		let sum = 0;
		for(let i = 0; i < array.length; i++){
			sum += array[i];
		}
		return sum;
	};

	let listOfNumArray = []
	while( true ){
		userInput = prompt('numerical value?', '0')
		if(!isFinite(userInput) || userInput === null) break;
		listOfNumArray.push(+userInput);
	}

	alert( sumInput( listOfNumArray ));
	

</script>
