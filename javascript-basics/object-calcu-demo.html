<script>
	function Calculator(){

		this.read = () => {
			this.a = +prompt('Value of a?', '0');
			this.b = +prompt('Value of b?', '0');
		},
			this.sum = () => {
			return this.a + this.b
		},
			this.mul = () => {
			return this.a * this.b
		}
	
	};

	let calculator = new Calculator();

	calculator.read();
	alert( calculator.sum() )
	alert( calculator.mul() )
</script>
